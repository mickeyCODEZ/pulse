<!-- @dsCard group="Brand" viewport="700x180" name="Logo & wordmark" subtitle="Map-pin + radar pulse mark; Bodoni wordmark; adapts per theme" -->
<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;display:flex;}
  .pane{flex:1;padding:28px;display:flex;align-items:center;gap:30px;}
  .lock{display:inline-flex;align-items:center;gap:10px;color:var(--text-strong);}
  .mark{width:34px;height:34px;}
  .word{font-family:var(--font-display);font-weight:700;font-size:30px;letter-spacing:-0.02em;color:var(--text-strong);}
</style></head><body>
  <div class="pane" data-theme="light" style="background:var(--surface-page)">
    <span class="lock">
      <svg class="mark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21.6 C12 21.6 18.8 14.8 18.8 9 A6.8 6.8 0 1 0 5.2 9 C5.2 14.8 12 21.6 12 21.6 Z"/><circle cx="12" cy="8.8" r="1.5" fill="currentColor" stroke="none"/><path d="M14.7 6.1 a3.9 3.9 0 0 1 0 5.4"/><path d="M9.3 6.1 a3.9 3.9 0 0 0 0 5.4"/></svg>
      <span class="word">Pulse</span>
    </span>
    <svg class="mark" viewBox="0 0 24 24" fill="none" stroke="var(--text-strong)" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21.6 C12 21.6 18.8 14.8 18.8 9 A6.8 6.8 0 1 0 5.2 9 C5.2 14.8 12 21.6 12 21.6 Z"/><circle cx="12" cy="8.8" r="1.5" fill="var(--text-strong)" stroke="none"/><path d="M14.7 6.1 a3.9 3.9 0 0 1 0 5.4"/><path d="M9.3 6.1 a3.9 3.9 0 0 0 0 5.4"/></svg>
  </div>
  <div class="pane" data-theme="dark" style="background:var(--surface-page)">
    <span class="lock">
      <svg class="mark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21.6 C12 21.6 18.8 14.8 18.8 9 A6.8 6.8 0 1 0 5.2 9 C5.2 14.8 12 21.6 12 21.6 Z"/><circle cx="12" cy="8.8" r="1.5" fill="currentColor" stroke="none"/><path d="M14.7 6.1 a3.9 3.9 0 0 1 0 5.4"/><path d="M9.3 6.1 a3.9 3.9 0 0 0 0 5.4"/></svg>
      <span class="word">Pulse</span>
    </span>
  </div>
</body></html>
