<!-- @dsCard group="Spacing" viewport="700x150" name="Radius" subtitle="Restrained, editorial — xs → xl + pill" -->
<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--surface-page);padding:22px;font-family:var(--font-sans);}
  .row{display:flex;gap:18px;align-items:flex-end;}
  .item{display:flex;flex-direction:column;align-items:center;gap:8px;}
  .box{width:64px;height:64px;background:var(--surface-card);border:1px solid var(--border-strong);}
  .lab{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);letter-spacing:0.02em;}
</style></head><body>
  <div class="row">
    <div class="item"><div class="box" style="border-radius:var(--radius-xs)"></div><span class="lab">xs · 3</span></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-sm)"></div><span class="lab">sm · 5</span></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-md)"></div><span class="lab">md · 8</span></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-lg)"></div><span class="lab">lg · 12</span></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-xl)"></div><span class="lab">xl · 18</span></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-pill);width:96px"></div><span class="lab">pill</span></div>
  </div>
</body></html>
