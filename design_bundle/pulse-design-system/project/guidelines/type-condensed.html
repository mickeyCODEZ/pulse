<!-- @dsCard group="Type" viewport="700x180" name="Kickers · Oswald condensed" subtitle="Newspaper departments, deco buttons, filter tabs" -->
<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--surface-page);padding:24px;font-family:var(--font-sans);}
  .lab{font-family:var(--font-condensed);font-weight:600;font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-faint);margin-bottom:10px;}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:16px;}
  .kicker{font-family:var(--font-condensed);font-weight:600;font-size:13px;letter-spacing:0.16em;text-transform:uppercase;color:var(--text-strong);display:inline-flex;align-items:center;gap:10px;}
  .kicker::before,.kicker::after{content:"";width:26px;height:1px;background:var(--text-strong);}
  .spot{color:var(--spot);}
  .tag{font-family:var(--font-condensed);font-weight:600;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;padding:3px 9px;border:1px solid var(--border);border-radius:5px;color:var(--text-muted);}
  .tag.solid{background:var(--accent);color:var(--accent-fg);border-color:var(--accent);}
  .btn{font-family:var(--font-condensed);font-weight:600;font-size:14px;letter-spacing:0.07em;text-transform:uppercase;padding:9px 18px;border-radius:999px;background:var(--accent);color:var(--accent-fg);border:none;}
</style></head><body>
  <div class="lab">Department kicker (flanked rules)</div>
  <div class="row"><span class="kicker">Arts &amp; Culture</span><span class="kicker spot">Extra</span></div>
  <div class="lab">Tabs · tags · deco button</div>
  <div class="row">
    <span class="tag">Live music</span><span class="tag">Talk</span><span class="tag solid">Free</span>
    <button class="btn">Get tickets</button>
  </div>
</body></html>
