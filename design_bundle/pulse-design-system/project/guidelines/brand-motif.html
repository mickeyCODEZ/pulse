<!-- @dsCard group="Brand" viewport="700x200" name="Line-map motif" subtitle="Signature topographic texture — overlay & image duotone" -->
<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--surface-page);padding:20px;font-family:var(--font-sans);display:flex;gap:16px;}
  .tile{flex:1;border:1px solid var(--border);border-radius:var(--radius-md);overflow:hidden;position:relative;height:150px;}
  .lab{position:absolute;left:10px;bottom:9px;font-family:var(--font-mono);font-size:9px;letter-spacing:0.08em;text-transform:uppercase;color:var(--white);background:color-mix(in srgb, var(--black) 45%, transparent);padding:3px 7px;border-radius:4px;backdrop-filter:blur(4px);z-index:2;}
  .lab.dark{color:var(--text-strong);background:var(--accent-soft);}
  .map{background:var(--surface-sunken);}
</style></head><body>
  <div class="tile map map-overlay"><span class="lab dark">overlay · multiply</span></div>
  <div class="tile img-duotone"><span class="lab">duotone image</span></div>
  <div class="tile img-duotone" style="background-position:70% 30%"><span class="lab">duotone · shifted</span></div>
</body></html>
