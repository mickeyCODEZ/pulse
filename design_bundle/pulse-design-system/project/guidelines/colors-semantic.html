<!-- @dsCard group="Colors" viewport="700x150" name="Colors · Semantic surfaces" subtitle="Theme-agnostic surface & text aliases (light shown)" -->
<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--surface-page);padding:20px;font-family:var(--font-sans);}
  .lab{font-family:var(--font-mono);font-size:9px;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-muted);margin-top:6px;}
  .hex{font-family:var(--font-mono);font-size:9px;color:var(--text-faint);letter-spacing:0.02em;}
  .sw-row{display:flex;gap:0;border:1px solid var(--border);border-radius:var(--radius-md);overflow:hidden;}
  .sw{flex:1;}.sw .chip{height:64px;}
  .sw .meta{padding:7px 8px;background:var(--surface-card);border-top:1px solid var(--border);}
</style></head><body><div data-theme="light" style="background:transparent"><div class="sw-row"><div class="sw"><div class="chip" style="background:var(--surface-page)"></div><div class="meta"><div class="lab">surface-page</div><div class="hex"></div></div></div><div class="sw"><div class="chip" style="background:var(--surface-card)"></div><div class="meta"><div class="lab">surface-card</div><div class="hex"></div></div></div><div class="sw"><div class="chip" style="background:var(--surface-raised)"></div><div class="meta"><div class="lab">surface-raised</div><div class="hex"></div></div></div><div class="sw"><div class="chip" style="background:var(--surface-inverse)"></div><div class="meta"><div class="lab">surface-inverse</div><div class="hex"></div></div></div><div class="sw"><div class="chip" style="background:var(--accent)"></div><div class="meta"><div class="lab">accent</div><div class="hex"></div></div></div></div></div></body></html>
