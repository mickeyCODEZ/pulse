<!-- @dsCard group="Colors" viewport="700x150" name="Colors · Status" subtitle="Minimal chroma — feedback only, never content" -->
<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--surface-page);padding:20px;font-family:var(--font-sans);}
  .lab{font-family:var(--font-mono);font-size:9px;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-muted);margin-top:6px;}
  .hex{font-family:var(--font-mono);font-size:9px;color:var(--text-faint);letter-spacing:0.02em;}
  .sw-row{display:flex;gap:0;border:1px solid var(--border);border-radius:var(--radius-md);overflow:hidden;}
  .sw{flex:1;}.sw .chip{height:64px;}
  .sw .meta{padding:7px 8px;background:var(--surface-card);border-top:1px solid var(--border);}
</style></head><body><div data-theme="light" style="background:transparent"><div class="sw-row"><div class="sw"><div class="chip" style="background:var(--ok)"></div><div class="meta"><div class="lab">ok</div><div class="hex">#2F6B4F</div></div></div><div class="sw"><div class="chip" style="background:var(--warn)"></div><div class="meta"><div class="lab">warn</div><div class="hex">#8A6A1E</div></div></div><div class="sw"><div class="chip" style="background:var(--error)"></div><div class="meta"><div class="lab">error</div><div class="hex">#8A3526</div></div></div><div class="sw"><div class="chip" style="background:var(--accent-soft)"></div><div class="meta"><div class="lab">accent-soft</div><div class="hex"></div></div></div><div class="sw"><div class="chip" style="background:var(--border-strong)"></div><div class="meta"><div class="lab">border-strong</div><div class="hex"></div></div></div></div></div></body></html>
