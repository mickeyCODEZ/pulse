<!-- @dsCard group="Type" viewport="700x170" name="Wire · JetBrains Mono" subtitle="Timestamps, sources & data — the teletype voice" -->
<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--surface-page);padding:24px;font-family:var(--font-sans);}
  .lab{font-family:var(--font-mono);font-size:9px;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-faint);margin-bottom:10px;}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:14px;}
  .mono-label{font-family:var(--font-mono);font-weight:500;font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-muted);}
  .pill{font-family:var(--font-mono);font-size:11px;letter-spacing:0.06em;text-transform:uppercase;padding:4px 9px;border-radius:5px;border:1px solid var(--border);color:var(--text-muted);}
  .pill.solid{background:var(--accent);color:var(--accent-fg);border-color:var(--accent);}
  .meta{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);letter-spacing:0.03em;}
</style></head><body>
  <div class="lab">Source / wire</div>
  <div class="row">
    <span class="mono-label">via Resident Advisor</span>
    <span class="pill">also on DICE</span>
  </div>
  <div class="lab">Metadata</div>
  <div class="row"><span class="meta">FRI · 9:00PM&nbsp;&nbsp;·&nbsp;&nbsp;THE LOT&nbsp;&nbsp;·&nbsp;&nbsp;0.4MI&nbsp;&nbsp;·&nbsp;&nbsp;ADDED 2H AGO</span></div>
</body></html>
