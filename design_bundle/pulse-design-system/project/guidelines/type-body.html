<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--surface-page);padding:24px;color:var(--text-body);font-family:var(--font-sans);}

  <div class="lab">Lead · 19 / 1.5 · drop cap</div>

  <div class="lab">Body · 17 / 1.55 · roman & italic</div>
  <p class="body">We <b style="font-weight:600;">rank</b>, we don't pre-filter. Every card earns its place with a <i>visible reason</i> it surfaced.</p>
