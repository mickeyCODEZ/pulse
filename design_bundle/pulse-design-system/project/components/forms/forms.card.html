<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin:0; background:var(--surface-page); padding:22px; }
  .grid { display:grid; grid-template-columns:1fr 1fr; gap:22px 26px; align-items:start; }
  .block { display:flex; flex-direction:column; gap:10px; }
  .cap { font-family:var(--font-mono); font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:var(--text-faint); }
  .row { display:flex; gap:10px; flex-wrap:wrap; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const NS = window.PulseDesignSystem_3c2543;
const { Input, Select, Switch, Checkbox, SegmentedControl } = NS;
const Pin = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>;

function Demo(){
  const [free,setFree] = React.useState(true);
  const [weekends,setWeekends] = React.useState(false);
  const [music,setMusic] = React.useState(true);
  const [art,setArt] = React.useState(false);
  const [food,setFood] = React.useState(true);
  const [mode,setMode] = React.useState("Boost");
  const [sort,setSort] = React.useState("For you");
  return (
    <div className="grid">
      <div className="block">
        <span className="cap">Text field</span>
        <Input label="Home base" placeholder="Search a city or address" iconLeft={<Pin/>} />
      </div>
      <div className="block">
        <span className="cap">Select</span>
        <Select label="Sort" value={sort} onChange={e=>setSort(e.target.value)} options={["For you","Soonest","Nearest","Cheapest"]} />
      </div>

      <div className="block">
        <span className="cap">Switches · dealbreakers</span>
        <Switch checked={free} onChange={setFree} label="Free events only"/>
        <Switch checked={weekends} onChange={setWeekends} label="Nights & weekends"/>
      </div>
      <div className="block">
        <span className="cap">Interest pills</span>
        <div className="row">
          <Checkbox checked={music} onChange={setMusic} label="Live music"/>
          <Checkbox checked={art} onChange={setArt} label="Art"/>
          <Checkbox checked={food} onChange={setFood} label="Food"/>
        </div>
      </div>

      <div className="block">
        <span className="cap">Segmented · boost / mute</span>
        <SegmentedControl value={mode} onChange={setMode} options={["Mute","Normal","Boost"]}/>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo/>);
</script>
</body>
</html>
