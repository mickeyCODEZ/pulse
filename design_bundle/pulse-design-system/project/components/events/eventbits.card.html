<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin:0; background:var(--surface-page); padding:22px; }
  .cap { font-family:var(--font-mono); font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:var(--text-faint); margin:0 0 9px; display:block; }
  .block { margin-bottom:20px; }
  .row { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
  .grid { display:grid; grid-template-columns:1fr 1fr; gap:20px 26px; align-items:start; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const NS = window.PulseDesignSystem_3c2543;
const { RelevanceChip, SourceBadge, PriceTag, MapPin, LocationSwitcher, DigestItem, EventCard } = NS;
function Demo(){
  const [sel,setSel]=React.useState("a");
  return (
    <div>
      <div className="grid">
        <div className="block">
          <span className="cap">Relevance chip</span>
          <div className="row" style={{flexDirection:"column", alignItems:"flex-start"}}>
            <RelevanceChip reasons={["live music","under $15"]} score={94}/>
            <RelevanceChip reasons={["history","free","rarely listed"]} compact/>
          </div>
        </div>
        <div className="block">
          <span className="cap">Source + dedup</span>
          <div className="row" style={{flexDirection:"column", alignItems:"flex-start", gap:"8px"}}>
            <SourceBadge sources={["Resident Advisor","DICE","Eventbrite"]}/>
            <SourceBadge sources={["City Library"]}/>
          </div>
        </div>
        <div className="block">
          <span className="cap">Price</span>
          <div className="row"><PriceTag free/><PriceTag price="$15–40"/><PriceTag price={12}/></div>
        </div>
        <div className="block">
          <span className="cap">Location switcher</span>
          <div className="row"><LocationSwitcher city="Lisbon" loading/></div>
        </div>
      </div>
      <div className="block">
        <span className="cap">Map pins + price markers</span>
        <div className="row">
          <MapPin label="$12" selected={sel==="a"} onClick={()=>setSel("a")}/>
          <MapPin free selected={sel==="b"} onClick={()=>setSel("b")}/>
          <MapPin label="$28" gem selected={sel==="c"} onClick={()=>setSel("c")}/>
          <MapPin dot label="point"/>
        </div>
      </div>
      <div className="block">
        <span className="cap">Digest row</span>
        <DigestItem index={1} event={{category:"Live music", title:"Warehouse jazz, after hours", date:"Fri · 9pm", venue:"The Lot", price:12, relevance:["live music","under $15"]}}/>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo/>);
</script>
</body>
</html>
