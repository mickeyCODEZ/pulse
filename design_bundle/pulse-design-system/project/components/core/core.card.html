<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin:0; background:var(--surface-page); padding:22px; }
  .grid { display:flex; flex-direction:column; gap:20px; }
  .row { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .block { display:flex; flex-direction:column; gap:9px; }
  .cap { font-family:var(--font-mono); font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:var(--text-faint); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const NS = window.PulseDesignSystem_3c2543;
const { Logo, Button, IconButton, Tag, Badge, Card, Avatar } = NS;

const Ic = ({d}) => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">{d}</svg>;
const bookmark = <Ic d={<path d="M6 3h12a1 1 0 0 1 1 1v17l-7-4-7 4V4a1 1 0 0 1 1-1z"/>} />;
const x = <Ic d={<><path d="M18 6 6 18"/><path d="m6 6 12 12"/></>} />;
const share = <Ic d={<><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="m8.6 13.5 6.8 4M15.4 6.5 8.6 10.5"/></>} />;

function Demo(){
  return (
    <div className="grid">
      <div className="row" style={{justifyContent:"space-between"}}>
        <Logo size={26}/>
        <Logo size={22} showWordmark={false}/>
      </div>

      <div className="block">
        <span className="cap">Buttons</span>
        <div className="row">
          <Button>Get tickets</Button>
          <Button variant="secondary">Save</Button>
          <Button variant="ghost">Not interested</Button>
          <Button size="sm">Small</Button>
          <Button size="lg">Large</Button>
          <Button disabled>Disabled</Button>
        </div>
      </div>

      <div className="block">
        <span className="cap">Icon buttons</span>
        <div className="row">
          <IconButton label="Save" active>{bookmark}</IconButton>
          <IconButton label="Save" variant="outline">{bookmark}</IconButton>
          <IconButton label="Dismiss" variant="outline">{x}</IconButton>
          <IconButton label="Share" variant="solid">{share}</IconButton>
          <IconButton label="Share" round variant="outline">{share}</IconButton>
        </div>
      </div>

      <div className="row" style={{gap:"28px", alignItems:"flex-start"}}>
        <div className="block">
          <span className="cap">Tags</span>
          <div className="row">
            <Tag>Live music</Tag><Tag>Talk</Tag><Tag solid>Free</Tag>
          </div>
        </div>
        <div className="block">
          <span className="cap">Badges</span>
          <div className="row">
            <Badge tone="inverse">3 new</Badge>
            <Badge>added 2h ago</Badge>
            <Badge dot tone="ok"/>
          </div>
        </div>
        <div className="block">
          <span className="cap">Avatars</span>
          <div className="row">
            <Avatar name="Ana Ruiz"/><Avatar name="You" size={30}/>
          </div>
        </div>
      </div>

      <div className="row" style={{gap:"14px", alignItems:"stretch"}}>
        <Card style={{flex:1}}>
          <div style={{fontFamily:"var(--font-display)", fontSize:"20px", color:"var(--text-strong)"}}>Surface card</div>
          <div style={{fontSize:"13px", color:"var(--text-muted)", marginTop:"4px"}}>Hairline border, soft elevation.</div>
        </Card>
        <Card inverse style={{flex:1}}>
          <div style={{fontFamily:"var(--font-display)", fontSize:"20px"}}>Hidden gem</div>
          <div style={{fontSize:"13px", opacity:0.7, marginTop:"4px"}}>Inverted ink surface.</div>
        </Card>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo/>);
</script>
</body>
</html>
